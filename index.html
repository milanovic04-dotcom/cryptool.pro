<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTOOL | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-red: #d32f2f;
            --bg-light: #f8fafc;
            --text-dark: #1a202c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }

        /* --- СТРИКТЕН COMING SOON ЕКРАН - МОРА ДА СЕ ПОЈАВИ ПРВ --- */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #f0f7ff, #f2faf3, #fffdf2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999; /* Највисок приоритет */
        }

        .crypto-rain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .coin-float { position: absolute; opacity: 0.2; animation: floatUp 10s infinite linear; font-size: 2.5rem; color: #1a202c; }
        
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            border: 1px solid white;
            z-index: 100000;
            max-width: 500px;
            width: 90%;
        }

        /* --- ГЛАВНА СОДРЖИНА - СКРИЕНА --- */
        #main-app { display: none; visibility: hidden; }

        .logo-title { color: var(--brand-red); font-size: 3rem; font-weight: 800; margin-bottom: 10px; }
        .partner-label { font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; color: #64748b; margin-bottom: 35px; }

        input { padding: 14px; border-radius: 15px; border: 1px solid #ddd; outline: none; margin-bottom: 15px; width: 100%; text-align: center; font-size: 1rem; }
        .btn-red { background: var(--brand-red); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-red:hover { transform: scale(1.02); background: #b71c1c; }

        /* Dashboard Styles за подоцна */
        .container { max-width: 1200px; margin: 0 auto; padding: 120px 20px; }
        nav { position: fixed; top: 0; width: 100%; background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: border-bottom: 1px solid #eee; z-index: 1000; }
    </style>
</head>
<body>

<!-- COMING SOON ЕКРАН -->
<section id="auth-screen">
    <div class="crypto-rain" id="rain"></div>
    <div class="auth-card">
        <div class="logo-title"><i class="fa-solid fa-screwdriver-wrench"></i> CRYPTOOL</div>
        <div class="partner-label">POWERED BY KAPITAL MEDIA GROUP</div>
        
        <p style="margin-bottom: 20px; color: #4a5568; font-weight: 600;">Внесете лозинка за преглед:</p>
        <input type="password" id="passCode" placeholder="Лозинка">
        <button class="btn-red" onclick="unlock()">ВЛЕЗИ</button>
        <p id="errorMsg" style="color: red; margin-top: 15px; font-weight: 700; display: none;">Неточна лозинка!</p>
    </div>
</section>

<!-- ГЛАВНА СТРАНА -->
<div id="main-app">
    <nav>
        <div style="font-weight: 800; font-size: 1.5rem; color: var(--brand-red);">CRYPTOOL</div>
        <div style="font-weight: 700; font-size: 0.8rem;">PARTNER: <a href="https://kapital.mk" target="_blank" style="color: var(--brand-red); text-decoration: none;">KAPITAL.MK</a></div>
    </nav>

    <div class="container">
        <div style="background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-left: 8px solid var(--brand-red);">
            <small style="background: var(--brand-red); color: white; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 0.7rem;">BREAKING</small>
            <h1 style="margin: 20px 0;">Ondo Finance: Институционална револуција</h1>
            <p>Успешно се најавивте. Овде ќе се појави целосната содржина на порталот.</p>
        </div>

        <!-- Тука оди остатокот од Dashboard-от што го направивме претходно -->
    </div>

    <footer style="text-align: center; padding: 40px; border-top: 1px solid #eee; margin-top: 50px;">
        <div style="font-weight: 800; color: var(--brand-red);">CRYPTOOL</div>
        <p style="font-size: 0.8rem; margin-top: 10px;">info@cryptool.pro</p>
    </footer>
</div>

<script>
    // Crypto Rain Logic
    const rain = document.getElementById('rain');
    function createCoin() {
        const coin = document.createElement('i');
        coin.className = 'fa-brands fa-bitcoin coin-float';
        coin.style.left = Math.random() * 100 + "vw";
        coin.style.animationDuration = (Math.random() * 5 + 7) + "s";
        rain.appendChild(coin);
        setTimeout(() => coin.remove(), 10000);
    }
    setInterval(createCoin, 700);

    // Unlock Logic
    function unlock() {
        const pass = document.getElementById('passCode').value;
        if(pass === "cryptool2026") {
            // Целосно отстранување на екранот за лозинка
            document.getElementById('auth-screen').style.display = 'none';
            // Прикажување на главната апликација
            const app = document.getElementById('main-app');
            app.style.display = 'block';
            app.style.visibility = 'visible';
            // Овозможување скролање
            document.body.style.overflow = 'auto';
            document.documentElement.style.overflow = 'auto';
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    // Enter Key
    document.getElementById('passCode').addEventListener("keyup", function(e) {
        if (e.key === "Enter") unlock();
    });
</script>

</body>
</html>
